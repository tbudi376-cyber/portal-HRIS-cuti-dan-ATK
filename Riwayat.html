<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Permintaan ATK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { border: 4px solid rgba(0,0,0,.1); border-left-color: #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        .btn-confirm { background-color: #16a34a; color: white; }
        .btn-confirm:hover { background-color: #15803d; }
        .btn-confirm:disabled { background-color: #9ca3af; }
    </style>
</head>
<body class="bg-gray-100 font-sans p-3 sm:p-6">
    <div class="container mx-auto p-4 sm:p-6 md:p-8 max-w-2xl">
        <div class="bg-white rounded-lg shadow-xl p-5 sm:p-8">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-2">Lacak & Konfirmasi Permintaan</h1>
            <p class="text-gray-600 mb-6 text-sm sm:text-base">Masukkan email Anda untuk melihat riwayat permintaan dan melakukan konfirmasi pengambilan barang.</p>

            <form id="search-form">
                <div class="mb-4">
                    <label for="email-search" class="block text-gray-700 font-semibold mb-2">Email Karyawan</label>
                    <div class="flex flex-col sm:flex-row gap-2">
                        <input type="email" id="email-search" class="w-full px-4 py-3 sm:py-2 border rounded-md text-base" placeholder="Masukkan email Anda..." required>
                        <button type="submit" id="search-btn" class="w-full sm:w-auto bg-indigo-600 text-white font-bold py-3 px-4 rounded-md hover:bg-indigo-700 transition">Cari</button>
                    </div>
                </div>
            </form>

            <div id="result-container" class="mt-8"></div>
            
            <!-- Link Kembali ke Menu Utama yang sudah diperbarui -->
            <div class="mt-8 pt-6 border-t border-gray-200 text-center">
                <a href="<?= getScriptUrl() ?>?page=menu" class="inline-flex items-center justify-center text-indigo-600 hover:text-indigo-800 font-medium transition">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Kembali ke Menu Utama
                </a>
            </div>
        </div>
    </div>
    
    <input type="file" id="photo-upload-input" accept="image/*" capture="user" class="hidden">

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchForm = document.getElementById('search-form');
            const searchBtn = document.getElementById('search-btn');
            const emailInput = document.getElementById('email-search');
            const resultContainer = document.getElementById('result-container');
            const fileInput = document.getElementById('photo-upload-input');
            
            let currentRowNum = null;

            searchForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = emailInput.value;
                if (!email) {
                    resultContainer.innerHTML = '<p class="text-red-500 text-center">Harap masukkan email.</p>';
                    return;
                }
                
                searchBtn.disabled = true;
                searchBtn.textContent = 'Mencari...';
                resultContainer.innerHTML = '<div class="flex justify-center items-center h-40"><div class="spinner"></div></div>';

                google.script.run
                    .withSuccessHandler(renderResults)
                    .withFailureHandler(showError)
                    .getUserRequests(email);
            });

            function renderResults(requests) {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Cari';
                if (requests.length === 0) {
                    resultContainer.innerHTML = '<p class="text-center text-gray-500 py-8">Tidak ada permintaan yang ditemukan.</p>';
                    return;
                }

                resultContainer.innerHTML = '';
                requests.forEach(req => {
                    const card = document.createElement('div');
                    card.className = 'p-4 border rounded-lg bg-gray-50 mb-4 shadow-sm';
                    
                    let statusColor = 'text-gray-500';
                    let actionButton = '';

                    if (req.status === 'Disetujui') {
                        statusColor = 'text-green-600 font-semibold';
                        actionButton = `<button data-row="${req.rowNum}" class="btn-upload-trigger btn-confirm w-full sm:w-auto text-sm font-semibold py-2 px-4 rounded-md transition shadow">Konfirmasi Ambil & Unggah Foto</button>`;
                    } else if (req.status === 'Ditolak') {
                        statusColor = 'text-red-600 font-semibold';
                    } else if (req.status === 'Sudah Diambil') {
                        statusColor = 'text-blue-600 font-semibold';
                        actionButton = `<a href="${req.proofLink}" target="_blank" class="inline-block mt-2 sm:mt-0 text-sm font-medium text-blue-600 hover:text-blue-800 hover:underline bg-blue-50 px-3 py-1 rounded-md border border-blue-200">Lihat Bukti Foto</a>`;
                    }

                    card.innerHTML = `
                        <div class="block sm:flex sm:justify-between sm:items-center">
                            <div class="mb-4 sm:mb-0">
                                <p class="font-bold text-gray-800">${req.itemName} (Jumlah: ${req.quantity})</p>
                                <p class="text-sm text-gray-500 mb-1">${new Date(req.timestamp).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' })}</p>
                                <p class="text-sm font-medium ${statusColor}" id="status-text-${req.rowNum}">Status: ${req.status}</p>
                            </div>
                            <div id="action-area-${req.rowNum}" class="text-right">
                                ${actionButton}
                            </div>
                        </div>
                    `;
                    resultContainer.appendChild(card);
                });
                
                attachUploadListener();
            }

            function showError(error) {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Cari';
                resultContainer.innerHTML = `<p class="text-center text-red-500 py-8">Terjadi Kesalahan: ${error.message}</p>`;
            }
            
            function attachUploadListener() {
                document.querySelectorAll('.btn-upload-trigger').forEach(button => {
                    button.addEventListener('click', (e) => {
                        e.preventDefault();
                        const rowNum = e.currentTarget.dataset.row;
                        currentRowNum = rowNum;
                        fileInput.value = null; 
                        fileInput.click(); 
                    });
                });
            }

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file || !currentRowNum) return;

                const actionArea = document.getElementById(`action-area-${currentRowNum}`);
                const originalButtonHTML = actionArea.innerHTML;

                actionArea.innerHTML = `<div class="flex items-center justify-end text-indigo-600 font-medium"><div class="spinner !border-2 !w-5 !h-5 mr-2"></div>Mengunggah...</div>`;

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const fileData = {
                        base64Data: reader.result,
                        fileName: `bukti_ambil_${currentRowNum}_${Date.now()}.png`,
                        mimeType: file.type
                    };
                    google.script.run
                        .withSuccessHandler(onConfirmSuccess)
                        .withFailureHandler(onConfirmError)
                        .confirmPickupWithPhoto(fileData, currentRowNum);
                };
                reader.onerror = (error) => {
                    alert('Gagal membaca file: ' + error);
                    actionArea.innerHTML = originalButtonHTML;
                };
            });

            function onConfirmSuccess(response) {
                if (response.success) {
                    const rowNum = currentRowNum;
                    const actionArea = document.getElementById(`action-area-${rowNum}`);
                    const statusText = document.getElementById(`status-text-${rowNum}`);
                    
                    actionArea.innerHTML = `<a href="${response.proofLink}" target="_blank" class="inline-block mt-2 sm:mt-0 text-sm font-medium text-blue-600 hover:text-blue-800 hover:underline bg-blue-50 px-3 py-1 rounded-md border border-blue-200">Lihat Bukti Foto</a>`;
                    statusText.textContent = `Status: ${response.newStatus}`;
                    statusText.className = 'text-sm font-medium text-blue-600 font-semibold';
                    currentRowNum = null;
                } else {
                    onConfirmError(response);
                }
            }

            function onConfirmError(error) {
                alert("Gagal mengunggah: " + error.message);
                searchForm.dispatchEvent(new Event('submit')); 
            }
        });
    </script>
</body>
</html>
