<script>
  // Script untuk menghitung durasi cuti secara otomatis
  function hitungLamaCuti() {
    const tglMulai = document.getElementById('tglMulai').value;
    const tglSelesai = document.getElementById('tglSelesai').value;
    
    if (tglMulai && tglSelesai) {
      const date1 = new Date(tglMulai);
      const date2 = new Date(tglSelesai);
      
      const diffTime = date2 - date1;
      // +1 agar tanggal mulai juga terhitung sebagai 1 hari
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; 
      
      if (diffDays > 0) {
        document.getElementById('lamaCuti').value = diffDays;
      } else {
        document.getElementById('lamaCuti').value = '';
        alert('Maaf, Tanggal Selesai tidak boleh mendahului Tanggal Mulai!');
        document.getElementById('tglSelesai').value = ''; // Reset input tanggal selesai
      }
    }
  }

  // Script yang berjalan saat tombol Submit ditekan
  function handleFormSubmit(event) {
    event.preventDefault(); // Mencegah halaman reload
    
    // 1. Ubah tampilan tombol jadi loading
    document.getElementById('btnSubmit').disabled = true;
    document.getElementById('loadingSpinner').style.display = 'inline-block';
    document.getElementById('btnText').innerText = 'Mengirim Data...';
    document.getElementById('pesan').style.display = 'none';

    // 2. Kumpulkan data dari form input
    const form = document.getElementById('cutiForm');
    const formData = new FormData(form);
    const dataObj = {};
    formData.forEach((value, key) => { dataObj[key] = value });

    // 3. Kirim data ke fungsi simpanDataCuti di Kode.gs (Backend)
    google.script.run
      .withSuccessHandler(onSuccess) // Jika berhasil, jalankan fungsi onSuccess
      .withFailureHandler(onFailure) // Jika gagal/error, jalankan fungsi onFailure
      .simpanDataCuti(dataObj);
  }

  // Script jika respon dari Apps Script berhasil
  function onSuccess(response) {
    const pesanEl = document.getElementById('pesan');
    pesanEl.style.display = 'block';
    
    if(response.status === 'success') {
      pesanEl.className = 'alert alert-success';
      pesanEl.innerHTML = '<strong>Berhasil!</strong> ' + response.message;
      document.getElementById('cutiForm').reset(); // Kosongkan form untuk pengajuan berikutnya
    } else {
      // Menangkap error logika dari backend (misal sheet tidak ada)
      pesanEl.className = 'alert alert-danger';
      pesanEl.innerHTML = '<strong>Gagal!</strong> ' + response.message;
    }
    
    kembalikanTombol();
  }

  // Script jika koneksi terputus atau terjadi error fatal pada server Google
  function onFailure(error) {
    const pesanEl = document.getElementById('pesan');
    pesanEl.style.display = 'block';
    pesanEl.className = 'alert alert-danger';
    pesanEl.innerHTML = '<strong>Terjadi Kesalahan Sistem:</strong> ' + error.message;
    
    kembalikanTombol();
  }

  // Script untuk mereset tombol kembali seperti semula
  function kembalikanTombol() {
    document.getElementById('btnSubmit').disabled = false;
    document.getElementById('loadingSpinner').style.display = 'none';
    document.getElementById('btnText').innerText = 'Kirim Pengajuan Cuti';
    
    // Auto sembunyikan notifikasi setelah 5 detik (opsional)
    setTimeout(() => {
      document.getElementById('pesan').style.display = 'none';
    }, 5000);
  }
</script>
